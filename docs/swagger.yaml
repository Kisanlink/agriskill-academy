info:
  contact: {}
paths:
  /api/admin/analytics/applications:
    get:
      consumes:
      - application/json
      description: Get application-related analytics for admin dashboard
      produces:
      - application/json
      responses:
        "200":
          description: Application analytics retrieved successfully
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
      security:
      - BearerAuth: []
      summary: Get Application Analytics
      tags:
      - Admin Analytics
  /api/admin/analytics/companies:
    get:
      consumes:
      - application/json
      description: Retrieve analytics for all companies
      produces:
      - application/json
      responses:
        "200":
          description: Company analytics retrieved successfully
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
        "500":
          description: Failed to fetch company analytics
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
      security:
      - BearerAuth: []
      summary: Get Company Analytics
      tags:
      - Admin Company Management
  /api/admin/analytics/dashboard:
    get:
      consumes:
      - application/json
      description: Get comprehensive dashboard analytics for admin
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard analytics retrieved successfully
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
      security:
      - BearerAuth: []
      summary: Get Dashboard Analytics
      tags:
      - Admin Analytics
  /api/admin/analytics/jobs:
    get:
      consumes:
      - application/json
      description: Get job-related analytics for admin dashboard
      produces:
      - application/json
      responses:
        "200":
          description: Job analytics retrieved successfully
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
      security:
      - BearerAuth: []
      summary: Get Job Analytics
      tags:
      - Admin Analytics
  /api/admin/analytics/users:
    get:
      consumes:
      - application/json
      description: Get user-related analytics for admin dashboard
      produces:
      - application/json
      responses:
        "200":
          description: User analytics retrieved successfully
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/admin.AnalyticsResponse'
      security:
      - BearerAuth: []
      summary: Get User Analytics
      tags:
      - Admin Analytics
  /api/admin/companies:
    get:
      consumes:
      - application/json
      description: Retrieve a list of companies with optional filters and pagination
      parameters:
      - description: Company name filter
        in: query
        name: name
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Companies retrieved successfully
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "500":
          description: Failed to fetch companies
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
      security:
      - BearerAuth: []
      summary: Get Companies
      tags:
      - Admin Company Management
  /api/admin/companies/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a company by its unique ID
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Company deleted successfully
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "400":
          description: Company ID is required
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "404":
          description: Company not found
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "500":
          description: Failed to delete company
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
      security:
      - BearerAuth: []
      summary: Delete Company
      tags:
      - Admin Company Management
    get:
      consumes:
      - application/json
      description: Retrieve a company by its unique ID
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Company retrieved successfully
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "400":
          description: Company ID is required
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "404":
          description: Company not found
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
      security:
      - BearerAuth: []
      summary: Get Company by ID
      tags:
      - Admin Company Management
    put:
      consumes:
      - application/json
      description: Update an existing company by its unique ID
      parameters:
      - description: Company ID
        in: path
        name: id
        required: true
        type: string
      - description: Company update data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateCompanyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Company updated successfully
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "400":
          description: Invalid request or Company ID is required
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
        "404":
          description: Company not found
          schema:
            $ref: '#/definitions/admin.CompanyResponse'
      security:
      - BearerAuth: []
      summary: Update Company
      tags:
      - Admin Company Management
  /api/admin/users:
    get:
      consumes:
      - application/json
      description: Get list of users with pagination and filtering
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by role
        in: query
        name: role
        type: string
      - description: Search term
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Users retrieved successfully
          schema:
            $ref: '#/definitions/admin.UserResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/admin.UserResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/admin.UserResponse'
      security:
      - BearerAuth: []
      summary: Get Users
      tags:
      - Admin User Management
  /api/admin/users/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a user by their ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User deleted successfully
          schema:
            $ref: '#/definitions/admin.UserResponse'
        "400":
          description: User ID is required
          schema:
            $ref: '#/definitions/admin.UserResponse'
        "500":
          description: Failed to delete user
          schema:
            $ref: '#/definitions/admin.UserResponse'
      security:
      - BearerAuth: []
      summary: Delete User
      tags:
      - Admin User Management
    put:
      consumes:
      - application/json
      description: Update a user's information by user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: User update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User updated successfully
          schema:
            $ref: '#/definitions/admin.UserResponse'
        "400":
          description: Invalid request body or missing user ID
          schema:
            $ref: '#/definitions/admin.UserResponse'
        "500":
          description: Failed to update user
          schema:
            $ref: '#/definitions/admin.UserResponse'
      security:
      - BearerAuth: []
      summary: Update User
      tags:
      - Admin User Management
  /api/applications/{applicationId}:
    delete:
      description: Delete a job application (student only)
      parameters:
      - description: Application ID
        in: path
        name: applicationId
        required: true
        type: string
      responses:
        "200":
          description: Application removed successfully
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Permission denied
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Could not remove application
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Remove Application
      tags:
      - Applications
      x-swagger-ui: true
    get:
      consumes:
      - application/json
      description: Get a job application by its ID (student or employer)
      parameters:
      - description: Application ID
        in: path
        name: applicationId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Application retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Permission denied
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get Application By ID
      tags:
      - Applications
      x-swagger-ui: true
  /api/applications/{applicationId}/status:
    put:
      description: Update the status of a job application (student only)
      parameters:
      - description: Application ID
        in: path
        name: applicationId
        required: true
        type: string
      - description: Status update request
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/application.UpdateStatusRequest'
      responses:
        "200":
          description: Application status updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Permission denied
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update Application Status
      tags:
      - Applications
      x-swagger-ui: true
  /api/applications/my:
    get:
      consumes:
      - application/json
      description: Get all applications submitted by the current student
      produces:
      - application/json
      responses:
        "200":
          description: Applications fetched successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Permission denied
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get My Applications
      tags:
      - Applications
  /api/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset email to user
      parameters:
      - description: Email for password reset
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Password reset email sent
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid email
          schema:
            additionalProperties: true
