syntax = "proto3";

package aaa;

option go_package = "github.com/kisanlink/protobuf/pb-aaa";

// AAA Service - Authentication, Authorization, and Accounting
service UserService {
  // User Registration
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  
  // User Login
  rpc Login(LoginRequest) returns (LoginResponse);
  
  // Get User by ID
  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse);
  
  // Get User by Mobile Number
  rpc GetUserByMobileNumber(GetUserByMobileNumberRequest) returns (GetUserByMobileNumberResponse);
  
  // Assign Role to User
  rpc AssignRole(AssignRoleToUserRequest) returns (AssignRoleToUserResponse);
  
  // Validate User
  rpc ValidateUser(ValidateUserRequest) returns (ValidateUserResponse);
  
  // Create Relationship
  rpc CreateRelationship(CreateRelationshipRequest) returns (CreateRelationshipResponse);
  
  // Delete Relationship
  rpc DeleteRelationship(DeleteRelationshipRequest) returns (DeleteRelationshipResponse);
}

// Register User Request
message RegisterUserRequest {
  string name = 1;
  string email = 2;
  string mobile_number = 3;
  string password = 4;
  string role = 5;
}

// Register User Response
message RegisterUserResponse {
  bool success = 1;
  string message = 2;
  UserData data = 3;
  repeated string error = 4;
  int32 status_code = 5;
  string timestamp = 6;
}

// Login Request
message LoginRequest {
  string username = 1;
  string password = 2;
}

// Login Response
message LoginResponse {
  bool success = 1;
  string message = 2;
  UserData data = 3;
  repeated string error = 4;
  int32 status_code = 5;
  string timestamp = 6;
}

// Get User by ID Request
message GetUserByIdRequest {
  string user_id = 1;
}

// Get User by ID Response
message GetUserByIdResponse {
  bool success = 1;
  string message = 2;
  UserData data = 3;
  repeated string error = 4;
  int32 status_code = 5;
  string timestamp = 6;
}

// Get User by Mobile Number Request
message GetUserByMobileNumberRequest {
  string mobile_number = 1;
}

// Get User by Mobile Number Response
message GetUserByMobileNumberResponse {
  bool success = 1;
  string message = 2;
  UserData data = 3;
  repeated string error = 4;
  int32 status_code = 5;
  string timestamp = 6;
}

// Assign Role to User Request
message AssignRoleToUserRequest {
  string user_id = 1;
  string role_name = 2;
}

// Assign Role to User Response
message AssignRoleToUserResponse {
  bool success = 1;
  string message = 2;
  UserData data = 3;
  repeated string error = 4;
  int32 status_code = 5;
  string timestamp = 6;
}

// Validate User Request
message ValidateUserRequest {
  string user_id = 1;
  string validation_status = 2;
  string address = 3;
  PersonalDetails personal_details = 4;
}

// Validate User Response
message ValidateUserResponse {
  bool success = 1;
  string message = 2;
  UserData data = 3;
  repeated string error = 4;
  int32 status_code = 5;
  string timestamp = 6;
}

// Create Relationship Request
message CreateRelationshipRequest {
  string user_id = 1;
  string related_user_id = 2;
  string relationship_type = 3;
}

// Create Relationship Response
message CreateRelationshipResponse {
  bool success = 1;
  string message = 2;
  RelationshipData data = 3;
  repeated string error = 4;
  int32 status_code = 5;
  string timestamp = 6;
}

// Delete Relationship Request
message DeleteRelationshipRequest {
  string user_id = 1;
  string related_user_id = 2;
}

// Delete Relationship Response
message DeleteRelationshipResponse {
  bool success = 1;
  string message = 2;
  repeated string error = 3;
  int32 status_code = 4;
  string timestamp = 5;
}

// User Data
message UserData {
  string id = 1;
  string username = 2;
  string email = 3;
  string mobile_number = 4;
  bool is_validated = 5;
  repeated Role roles = 6;
  string created_at = 7;
  string updated_at = 8;
}

// Role
message Role {
  string role_name = 1;
  repeated Permission permissions = 2;
}

// Permission
message Permission {
  string resource = 1;
  repeated string actions = 2;
}

// Personal Details
message PersonalDetails {
  string full_name = 1;
  string date_of_birth = 2;
  string gender = 3;
  string address = 4;
  string city = 5;
  string state = 6;
  string country = 7;
  string postal_code = 8;
}

// Relationship Data
message RelationshipData {
  string id = 1;
  string user_id = 2;
  string related_user_id = 3;
  string relationship_type = 4;
  string created_at = 5;
  string updated_at = 6;
} 